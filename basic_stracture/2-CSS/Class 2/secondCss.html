<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
</head>
<style>
    .head {
        /* color: red; */
        /* color: #b1e505; */
        /* color: rgb(123,189,100); */

        font-size: 2rem;
        font-weight: bolder;
        font-style: italic;
        /* font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; */

        font-family: "Black Ops One", system-ui;
    }

    .box{
        width: 90%;
        height: 900px;

        border: 20px rgb(251, 89, 25) solid;
        /* border-radius:40px; */
        /* border-radius: 50%; */

        /* padding: 50px;
        margin: 50px; */

        /* padding/margin-left/right/top/bottom */
        /* padding-top: 200px;

        padding-left: 100px; */

        /* Because that it is parent for text class */
        position: relative;

        /* background-color: black; */

        background-image: url(./html.png);

        background-repeat: no-repeat;
        /* background-repeat: repeat-x;
        background-repeat: repeat-y; */

        background-position: center;

        /* background-size: contain; */
        background-size: cover;

    }

    .text{
        /* According to his parent */
        position: absolute;
        right: 20px;
    }

    .con{
        display: flex;
        gap: 20px;
        justify-content: center;
        /* justify-content: space-around; */
        /* justify-content: space-between; */
        /* justify-content: space-evenly; */

        /* flex-direction: column; */
        /* flex-direction: column-reverse; */
        flex-direction: row-reverse;
        flex-wrap: wrap;

        align-items: center;

    }

    .sq-1{
        width: 200px;
        height: 200px;
        background-color: green;
    }
    .sq-2{
        width: 200px;
        height: 200px;
        background-color: red;
    }
    .sq-3{
        width: 200px;
        height: 200px;
        background-color: yellow;
    }
    .sq-4{
        width: 200px;
        height: 200px;
        background-color: black;
    }

    .box1{
        width: 300px;
        height: 300px;
    

        /* Step 1 : COmpleted */
        animation: rotateBox 4s ease-in-out infinite;
    }

    /* My frames are from 0% to 100% */
    @keyframes rotateBox {
        0%{
            transform: rotate(0deg);
            border-radius: 0%;
            background-color: green;
        }
        25%{
            transform: rotate(90deg);
            border-radius: 15%;
            background-color: red;
        }
        50%{
            transform: rotate(180deg);
            border-radius: 40%;
            background-color: yellow;
        }
        75%{
            transform: rotate(270deg);
            border-radius: 65%;
            background-color: blue;
        }
        100%{
            transform: rotate(360deg);
            border-radius: 90%;     
            background-color: green;
        }
    }
</style>

<body>
    <div class="head">
        My name is Navbar
    </div>

    <div class="box">
        <!-- <div class="text">Hello I am a Box</div> -->

    </div>

    <!-- Diffrence b/w block tag & inline tag -->
    <!-- <span>Ayush</span>
    Kumar -->

    <!-- Div is block tag , takes full row space. -->
    <div>
        Ayush
    </div>
    Kumar

    <div class="con">
        <div class="sq-1"></div>
        <div class="sq-2"></div>
        <div class="sq-3"></div>
        <div class="sq-4"></div>
    </div>

    <div class="box1"></div>
</body>

</html>
