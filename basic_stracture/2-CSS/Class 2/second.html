<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Animation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 30px;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        .head {
            font-size: 2rem;
            font-weight: bolder;
            font-style: italic;
            font-family: "Black Ops One", system-ui;
            text-align: center;
            margin-bottom: 30px;
            color: #00ff88;
        }

        .box {
            width: 90%;
            height: 400px;
            border: 20px rgb(251, 89, 25) solid;
            position: relative;
            background-image: url(./html.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            margin: auto;
            margin-bottom: 40px;
        }

        .con {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 60px;
        }

        .sq-1,
        .sq-2,
        .sq-3,
        .sq-4 {
            width: 150px;
            height: 150px;
        }

        .sq-1 {
            background-color: green;
        }

        .sq-2 {
            background-color: red;
        }

        .sq-3 {
            background-color: yellow;
        }

        .sq-4 {
            background-color: black;
            border: 2px solid white;
        }

        .box1 {
            width: 180px;
            height: 180px;
            margin: 50px auto;
            background: linear-gradient(135deg, #00ff88, #0066ff);
            animation: advancedRotateBox 4s ease-in-out infinite;
            transform-style: preserve-3d;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        @keyframes advancedRotateBox {
            0% {
                transform: rotate(0deg) scale(1);
                border-radius: 0%;
                background: linear-gradient(135deg, #00ff88, #0066ff);
                box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            }

            25% {
                transform: rotate(90deg) scale(1.2) skew(8deg);
                border-radius: 20%;
                background: linear-gradient(135deg, #ff004c, #ffb300);
                box-shadow: 0 0 30px rgba(255, 0, 76, 0.8);
            }

            50% {
                transform: rotate(180deg) scale(0.9);
                border-radius: 50%;
                background: linear-gradient(135deg, #ffe600, #00d4ff);
                box-shadow: 0 0 45px rgba(255, 230, 0, 0.9);
            }

            75% {
                transform: rotate(270deg) scale(1.15) skew(-8deg);
                border-radius: 35%;
                background: linear-gradient(135deg, #004cff, #b300ff);
                box-shadow: 0 0 35px rgba(0, 76, 255, 0.8);
            }

            100% {
                transform: rotate(360deg) scale(1);
                border-radius: 0%;
                background: linear-gradient(135deg, #00ff88, #0066ff);
                box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            }
        }
    </style>
</head>

<body>
    <div class="head">
        My name is Navbar
    </div>

    <div class="box"></div>

    <div class="con">
        <div class="sq-1"></div>
        <div class="sq-2"></div>
        <div class="sq-3"></div>
        <div class="sq-4"></div>
    </div>

    <div class="box1"></div>
</body>
</html>
