        // async & await
        // async : it converts any function into promise
        // await : it is used to handle the promises, it is used only when top level has async function

        async function dataFetch(){
            let url="https://jsonplaceholder.typicode.com/posts";
            let res=await fetch(url); // readable stream --> .json
            let data=await res.json()

            return data
